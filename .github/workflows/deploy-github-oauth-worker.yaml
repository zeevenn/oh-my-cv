name: Deploy GitHub OAuth Worker

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-github-oauth-worker.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "packages/github-oauth-worker/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "github-oauth-worker"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: 24
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck worker
        run: pnpm --filter=@ohmycv/github-oauth-worker typecheck

      - name: Check Cloudflare API token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error title=Missing CLOUDFLARE_API_TOKEN::Add a repository Actions secret named CLOUDFLARE_API_TOKEN. Repository variables and environment secrets are not available here."
            exit 1
          fi

      - name: Deploy worker
        run: pnpm deploy:github-oauth-worker
